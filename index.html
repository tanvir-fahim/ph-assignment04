<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: "Geist", sans-serif;
            background-color: #f8fafc;
        }
    </style>

    <title>Fourth Assignment</title>
</head>

<body>
    <header class="max-w-5xl mx-auto mt-4 pb-6 border-b-2 border-[#E6E7E9]">
        <h1 class="text-2xl font-bold text-[#002C5C]">Job Application Tracker</h1>

        <div class="header-card grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <div class="total-card p-4 rounded-lg shadow-sm bg-white">
                <span class="text-sm">Total</span>
                <div id="stat-total" class="text-3xl font-bold text-blue-700 mt-2">8</div>
            </div>
            <div class="interview-card p-4 rounded-lg shadow-sm bg-white">
                <span class="text-sm">Interview</span>
                <div id="stat-interview" class="text-3xl font-bold text-emerald-500 mt-2">0</div>
            </div>
            <div class="rejected-card p-4 rounded-lg shadow-sm bg-white">
                <span class="text-sm">Rejected</span>
                <div id="stat-rejected" class="text-3xl font-bold text-red-500 mt-2">0</div>
            </div>
        </div>
    </header>
</body>

</html>
